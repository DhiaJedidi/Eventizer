<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg-subtle); padding: 20px 24px; font-family: var(--primitive-font-family-body); }
  .sec { margin-bottom: 18px; }
  .sec-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-disabled); margin-bottom: 8px; }
  .row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Badge, Input, Card, Avatar, Tag } = window.EventizerDesignSystem_3f2cb2;

function InlineIcon({ name, size = 13 }) {
  const p = {
    pin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
    users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: p[name] || '' }} style={{ flexShrink: 0 }} />;
}

function Showcase() {
  const [v, setV] = React.useState('');
  const [tags, setTags] = React.useState(['Tech', 'Paris', 'Conference']);

  return (
    <div>
      <div className="sec">
        <div className="sec-label">Button</div>
        <div className="row" style={{ marginBottom: 8 }}>
          <Button variant="primary">Create Event</Button>
          <Button variant="secondary">Export Data</Button>
          <Button variant="outline">View Details</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="primary" disabled>Saving…</Button>
        </div>
        <div className="row">
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="outline" size="sm">Outline Sm</Button>
          <Button variant="primary" size="lg">Large CTA</Button>
          <Button variant="secondary" size="lg">Register Now</Button>
        </div>
      </div>

      <div className="sec">
        <div className="sec-label">Badge</div>
        <div className="row">
          <Badge variant="success">Published</Badge>
          <Badge variant="warning">Draft</Badge>
          <Badge variant="danger">Cancelled</Badge>
          <Badge variant="info">Live</Badge>
          <Badge variant="primary">Featured</Badge>
          <Badge variant="secondary">New</Badge>
          <Badge variant="default">Past</Badge>
          <Badge size="sm" variant="success">Sm</Badge>
        </div>
      </div>

      <div className="sec">
        <div className="sec-label">Input</div>
        <div className="row" style={{ alignItems: 'flex-start' }}>
          <div style={{ flex: 1, minWidth: 180 }}>
            <Input label="Event Name" placeholder="e.g. Tech Summit 2026" value={v} onChange={e => setV(e.target.value)} required />
          </div>
          <div style={{ flex: 1, minWidth: 180 }}>
            <Input label="Location" error="Please enter a valid venue" value="Palais" onChange={() => {}} />
          </div>
          <div style={{ flex: 1, minWidth: 180 }}>
            <Input label="Capacity" disabled value="500" helperText="Editing locked" />
          </div>
        </div>
      </div>

      <div className="sec">
        <div className="sec-label">Avatar &amp; Tag</div>
        <div className="row">
          <Avatar name="Sophie Martin" size="xl" />
          <Avatar name="Alexandre Dupont" size="lg" />
          <Avatar name="Maria Costa" size="md" />
          <Avatar name="Thomas Petit" size="sm" />
          <Avatar size="xs" />
          <div style={{ width: 1, height: 40, background: 'var(--color-border-default)', margin: '0 6px' }} />
          <Tag>Technology</Tag>
          <Tag color="primary">Conference</Tag>
          <Tag color="gold">Featured</Tag>
          {tags.map(t => (
            <Tag key={t} color="primary" onDismiss={() => setTags(tags.filter(x => x !== t))}>{t}</Tag>
          ))}
        </div>
      </div>

      <div className="sec">
        <div className="sec-label">Card</div>
        <div style={{ maxWidth: 460 }}>
          <Card padding="md">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
              <Badge variant="success">Published</Badge>
              <div style={{ display: 'flex', alignItems: 'center', gap: -6 }}>
                <Avatar name="Sophie Martin" size="sm" />
                <Avatar name="Alex D" size="sm" style={{ marginLeft: -8 }} />
              </div>
            </div>
            <div style={{ fontFamily: 'var(--primitive-font-family-heading)', fontWeight: 700, fontSize: 16, color: 'var(--color-text-primary)', marginBottom: 4 }}>Tech Summit 2026</div>
            <div style={{ display: 'flex', gap: 14, fontSize: 12, color: 'var(--color-text-secondary)', marginBottom: 12 }}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><InlineIcon name="pin" />Paris Convention Centre</span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><InlineIcon name="users" />450 / 500</span>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <Button variant="outline" size="sm">Manage</Button>
              <Button variant="ghost" size="sm">Analytics</Button>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Showcase />);
</script>
</body>
</html>
