<!-- @dsCard group="Colors" viewport="700x120" name="Neutral Scale" subtitle="White → Near-black, 7 steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0f0; display: flex; gap: 8px; padding: 14px; font-family: var(--primitive-font-family-body); align-items: flex-end; }
  .swatch { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .block  { width: 100%; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); }
  .label  { font-size: 10px; color: #444; font-family: monospace; text-align: center; white-space: nowrap; }
</style>
</head>
<body>
  <div class="swatch">
    <div class="block" style="height:52px;background:var(--primitive-color-neutral-white)"></div>
    <div class="label">White<br>#FFF</div>
  </div>
  <div class="swatch">
    <div class="block" style="height:52px;background:var(--primitive-color-neutral-100)"></div>
    <div class="label">100<br>#F5F5F5</div>
  </div>
  <div class="swatch">
    <div class="block" style="height:52px;background:var(--primitive-color-neutral-200)"></div>
    <div class="label">200<br>#E8E8E8</div>
  </div>
  <div class="swatch">
    <div class="block" style="height:52px;background:var(--primitive-color-neutral-400)"></div>
    <div class="label">400<br>#9E9E9E</div>
  </div>
  <div class="swatch">
    <div class="block" style="height:52px;background:var(--primitive-color-neutral-600)"></div>
    <div class="label">600<br>#616161</div>
  </div>
  <div class="swatch">
    <div class="block" style="height:52px;background:var(--primitive-color-neutral-800)"></div>
    <div class="label">800<br>#222222</div>
  </div>
  <div class="swatch">
    <div class="block" style="height:52px;background:var(--primitive-color-neutral-black)"></div>
    <div class="label">Black<br>#0D0D0D</div>
  </div>
</body>
</html>
