<!-- @dsCard group="Type" viewport="700x280" name="Script / Accent" subtitle="Mistrully — decorative first-lines & slide titles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="specimen.css">
<style>
  body {
    background: var(--color-bg-subtle);
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  /* ── Hero specimen ─────────────────────────────────────── */
  .hero {
    background: var(--color-brand-primary);
    padding: 32px 36px 28px;
    position: relative;
    overflow: hidden;
  }
  /* decorative circle — echoes brand slide language */
  .hero::before {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: var(--color-brand-secondary);
    opacity: 0.22;
    top: -30px; right: -24px;
  }
  .script-large {
    font-family: var(--primitive-font-family-script);
    font-weight: 400;
    font-size: 58px;
    line-height: 1.0;
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }
  .paired-heading {
    font-family: var(--primitive-font-family-heading);
    font-weight: 700;
    font-size: 28px;
    line-height: 1.1;
    color: var(--color-brand-secondary);
    letter-spacing: -0.02em;
  }

  /* ── Specimens row ─────────────────────────────────────── */
  .row {
    display: flex;
    border-top: 1px solid var(--hair);
    background: var(--color-bg-surface);
  }
  .cell {
    flex: 1;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .cell + .cell { border-left: 1px solid var(--hair-soft); }
  .sample {
    font-family: var(--primitive-font-family-script);
    font-weight: 400;
    color: var(--color-text-primary);
  }

  /* ── Token row ─────────────────────────────────────────── */
  .tokens {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--hair-soft);
    background: var(--color-bg-subtle);
    padding: 10px 20px;
  }
  .token-pill {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--color-text-secondary);
    background: var(--color-bg-surface);
    border: 1px solid var(--hair);
    border-radius: 3px;
    padding: 3px 8px;
    margin-right: 6px;
    white-space: nowrap;
  }
</style>
</head>
<body>

  <!-- Hero: slide-context pairing (matches the brand slide language) -->
  <div class="hero">
    <div class="script-large">À propos</div>
    <div class="paired-heading">d'Eventizer</div>
  </div>

  <!-- Two size specimens -->
  <div class="row">
    <div class="cell">
      <div class="eyebrow" style="color:var(--color-text-disabled)">script-large · 48px</div>
      <div class="sample" style="font-size:48px;line-height:1;color:var(--color-brand-primary)">Innovate</div>
    </div>
    <div class="cell">
      <div class="eyebrow" style="color:var(--color-text-disabled)">script-accent · 36px</div>
      <div class="sample" style="font-size:36px;line-height:1.1;color:var(--color-brand-secondary)">Connect</div>
    </div>
    <div class="cell">
      <div class="eyebrow" style="color:var(--color-text-disabled)">inline pairing · 24px</div>
      <div class="sample" style="font-size:24px;line-height:1.2;color:var(--color-text-secondary)">Digitize</div>
    </div>
  </div>

  <!-- Token reference -->
  <div class="tokens">
    <span class="token-pill">--primitive-font-family-script</span>
    <span class="token-pill">--typography-script-large-*</span>
    <span class="token-pill">--typography-script-accent-*</span>
    <span class="token-pill" style="color:var(--color-brand-primary);border-color:var(--color-brand-primary)">✓ Self-hosted — assets/fonts/Mistrully.ttf</span>
  </div>

</body>
</html>
