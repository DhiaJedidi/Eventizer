<!-- @dsCard group="Spacing" viewport="700x120" name="Border Radius" subtitle="none → full (pill)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg-subtle); padding: 16px 24px; font-family: var(--primitive-font-family-body); display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 56px; height: 56px; background: var(--color-brand-primary); opacity: 0.85; }
  .name  { font-size: 11px; font-weight: 600; color: var(--color-text-primary); }
  .value { font-size: 10px; color: var(--color-text-disabled); font-family: monospace; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:0"></div><div class="name">None</div><div class="value">0px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--primitive-radius-sm)"></div><div class="name">sm</div><div class="value">4px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--primitive-radius-md)"></div><div class="name">md</div><div class="value">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--primitive-radius-lg)"></div><div class="name">lg</div><div class="value">16px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--primitive-radius-full);width:72px;height:32px"></div><div class="name">full</div><div class="value">9999px</div></div>
</body>
</html>
