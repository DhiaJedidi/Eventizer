<!-- @dsCard group="Colors" viewport="700x120" name="Status Colors" subtitle="Success, warning, danger, info" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg-surface); padding: 16px; font-family: var(--primitive-font-family-body); display: flex; gap: 10px; }
  .chip { flex: 1; padding: 10px 14px; border-radius: 10px; }
  .chip-name { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .chip-hex  { font-size: 10px; margin-top: 3px; opacity: 0.75; font-family: monospace; }
</style>
</head>
<body>
  <div class="chip" style="background:var(--color-status-success-bg);color:var(--color-status-success-text)">
    <div class="chip-name">Success</div><div class="chip-hex">#D1FAE5 / #065F46</div>
  </div>
  <div class="chip" style="background:var(--color-status-warning-bg);color:var(--color-status-warning-text)">
    <div class="chip-name">Warning</div><div class="chip-hex">#FEF3C7 / #92400E</div>
  </div>
  <div class="chip" style="background:var(--color-status-danger-bg);color:var(--color-status-danger-text)">
    <div class="chip-name">Danger</div><div class="chip-hex">#FEE2E2 / #991B1B</div>
  </div>
  <div class="chip" style="background:var(--color-status-info-bg);color:var(--color-status-info-text)">
    <div class="chip-name">Info</div><div class="chip-hex">#DBEAFE / #1E40AF</div>
  </div>
</body>
</html>
