<!-- @dsCard group="Type" viewport="700x260" name="Display Type" subtitle="H1–H3 — Montserrat Bold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg-surface); padding: 20px 24px; font-family: var(--primitive-font-family-heading); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font-family: var(--primitive-font-family-body); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-disabled); width: 36px; flex-shrink: 0; }
  .divider { height: 1px; background: var(--color-border-default); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">H1</div>
    <div style="font-family:var(--typography-display-h1-font-family);font-weight:var(--typography-display-h1-font-weight);font-size:var(--typography-display-h1-font-size);line-height:var(--typography-display-h1-line-height);letter-spacing:var(--typography-display-h1-letter-spacing);color:var(--color-text-primary)">Event Platform</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="label">H2</div>
    <div style="font-family:var(--typography-display-h2-font-family);font-weight:var(--typography-display-h2-font-weight);font-size:var(--typography-display-h2-font-size);line-height:var(--typography-display-h2-line-height);letter-spacing:var(--typography-display-h2-letter-spacing);color:var(--color-text-primary)">Connect Your Audience</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="label">H3</div>
    <div style="font-family:var(--typography-display-h3-font-family);font-weight:var(--typography-display-h3-font-weight);font-size:var(--typography-display-h3-font-size);line-height:var(--typography-display-h3-line-height);letter-spacing:var(--typography-display-h3-letter-spacing);color:var(--color-text-primary)">Register in Minutes</div>
  </div>
</body>
</html>
