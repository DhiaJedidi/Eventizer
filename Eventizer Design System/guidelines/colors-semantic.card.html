<!-- @dsCard group="Colors" viewport="700x220" name="Semantic Colors" subtitle="Background, text, border tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg-surface); padding: 16px; font-family: var(--primitive-font-family-body); display: flex; flex-direction: column; gap: 12px; }
  .group { display: flex; gap: 8px; }
  .group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-disabled); width: 60px; flex-shrink: 0; padding-top: 6px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { display: flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--color-border-default); }
  .dot  { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
  .chip-name { font-size: 11px; font-weight: 600; color: var(--color-text-primary); }
  .chip-token { font-size: 10px; color: var(--color-text-disabled); font-family: monospace; }
</style>
</head>
<body>
  <div class="group">
    <div class="group-label">BG</div>
    <div class="chips">
      <div class="chip"><div class="dot" style="background:var(--color-bg-surface)"></div><div><div class="chip-name">Surface</div><div class="chip-token">--color-bg-surface</div></div></div>
      <div class="chip"><div class="dot" style="background:var(--color-bg-subtle)"></div><div><div class="chip-name">Subtle</div><div class="chip-token">--color-bg-subtle</div></div></div>
      <div class="chip"><div class="dot" style="background:var(--color-bg-muted)"></div><div><div class="chip-name">Muted</div><div class="chip-token">--color-bg-muted</div></div></div>
    </div>
  </div>
  <div class="group">
    <div class="group-label">TEXT</div>
    <div class="chips">
      <div class="chip"><div class="dot" style="background:var(--color-text-primary)"></div><div><div class="chip-name">Primary</div><div class="chip-token">--color-text-primary</div></div></div>
      <div class="chip"><div class="dot" style="background:var(--color-text-secondary)"></div><div><div class="chip-name">Secondary</div><div class="chip-token">--color-text-secondary</div></div></div>
      <div class="chip"><div class="dot" style="background:var(--color-text-disabled)"></div><div><div class="chip-name">Disabled</div><div class="chip-token">--color-text-disabled</div></div></div>
      <div class="chip"><div class="dot" style="background:var(--color-text-inverse);border-color:var(--color-border-default)"></div><div><div class="chip-name">Inverse</div><div class="chip-token">--color-text-inverse</div></div></div>
    </div>
  </div>
  <div class="group">
    <div class="group-label">BORDER</div>
    <div class="chips">
      <div class="chip"><div class="dot" style="background:var(--color-border-default)"></div><div><div class="chip-name">Default</div><div class="chip-token">--color-border-default</div></div></div>
      <div class="chip"><div class="dot" style="background:var(--color-border-strong)"></div><div><div class="chip-name">Strong</div><div class="chip-token">--color-border-strong</div></div></div>
    </div>
  </div>
</body>
</html>
