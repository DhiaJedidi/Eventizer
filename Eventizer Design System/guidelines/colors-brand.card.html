<!-- @dsCard group="Colors" viewport="700x200" name="Brand Colors" subtitle="Primary blue + secondary gold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="specimen.css">
<style>
  body { display: flex; }
  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 26px 28px;
    position: relative;
  }
  .field + .field { border-left: 1px solid rgba(255,255,255,0.18); }
  .head { display: flex; flex-direction: column; gap: 12px; }
  .hex {
    font-family: var(--primitive-font-family-heading);
    font-weight: 700;
    font-size: 40px;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .token { font-family: var(--mono); font-size: 11px; letter-spacing: 0.01em; margin-top: 8px; }
  .role { font-size: 9px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="field" style="background:var(--color-brand-primary);color:#fff">
    <div class="head">
      <div class="role" style="color:rgba(255,255,255,0.75)">Brand · Primary</div>
      <span class="tick"></span>
    </div>
    <div>
      <div class="hex">#4563AC</div>
      <div class="token" style="color:rgba(255,255,255,0.62)">--color-brand-primary</div>
    </div>
  </div>
  <div class="field" style="background:var(--color-brand-secondary);color:#0D0D0D">
    <div class="head">
      <div class="role" style="color:rgba(13,13,13,0.6)">Brand · Secondary</div>
      <span class="tick" style="background:#0D0D0D"></span>
    </div>
    <div>
      <div class="hex">#E1AA2B</div>
      <div class="token" style="color:rgba(13,13,13,0.55)">--color-brand-secondary</div>
    </div>
  </div>
</body>
</html>
