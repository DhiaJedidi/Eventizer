<!-- @dsCard group="Brand" viewport="700x200" name="Brand Identity" subtitle="Wordmark, tagline, and type pairing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="specimen.css">
<style>
  body {
    background: #F0EDE6;
    display: flex;
    align-items: stretch;
    min-height: 200px;
  }

  /* ── Left: wordmark ──────────────────────────────────────── */
  .wordmark-panel {
    width: 260px;
    flex: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 36px;
    border-right: 1px solid rgba(69,99,172,0.15);
  }
  .wordmark {
    font-family: var(--primitive-font-family-heading);
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--color-brand-primary);
    display: flex;
    align-items: center;
    gap: 0;
  }
  .wordmark .e-accent { color: var(--color-brand-secondary); }
  .tagline {
    font-family: var(--primitive-font-family-body);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-top: 10px;
  }
  .tagline span { color: var(--color-brand-secondary); }

  /* ── Center: type pairing (from the slide) ───────────────── */
  .pairing-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 28px 32px;
    border-right: 1px solid rgba(69,99,172,0.10);
    gap: 2px;
  }
  .script-line {
    font-family: var(--primitive-font-family-script);
    font-weight: 400;
    font-size: 38px;
    line-height: 1.05;
    color: var(--color-brand-primary);
    letter-spacing: 0.01em;
  }
  .heading-line {
    font-family: var(--primitive-font-family-heading);
    font-weight: 700;
    font-size: 24px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--color-brand-secondary);
  }
  .pairing-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--color-text-disabled);
    margin-top: 8px;
  }

  /* ── Right: color chips ──────────────────────────────────── */
  .chips-panel {
    width: 110px;
    flex: none;
    display: flex;
    flex-direction: column;
  }
  .chip {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 8px 12px;
  }
  .chip-val {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .chip-name {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-top: 1px;
  }
</style>
</head>
<body>

  <div class="wordmark-panel">
    <div class="wordmark">
      <span>e<span class="e-accent">v</span>entizer</span>
    </div>
    <div class="tagline">Innovate <span>·</span> Connect <span>·</span> Digitize</div>
    <div style="margin-top:14px">
      <span class="tick"></span>
    </div>
  </div>

  <div class="pairing-panel">
    <div class="eyebrow" style="margin-bottom:10px">Signature type pairing</div>
    <div class="script-line">À propos</div>
    <div class="heading-line">d'Eventizer</div>
    <div class="pairing-label">Mistrully (script) + Montserrat Bold</div>
  </div>

  <div class="chips-panel">
    <div class="chip" style="background:var(--color-brand-primary);color:#fff">
      <div class="chip-val">#4563AC</div>
      <div class="chip-name">Primary</div>
    </div>
    <div class="chip" style="background:var(--color-brand-secondary);color:#0D0D0D">
      <div class="chip-val">#E1AA2B</div>
      <div class="chip-name">Secondary</div>
    </div>
  </div>

</body>
</html>
