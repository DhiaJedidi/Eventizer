<!-- @dsCard group="Type" viewport="700x180" name="Labels & Captions" subtitle="Label / Caption / Tagline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg-surface); padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .key  { font-family: var(--primitive-font-family-body); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-disabled); width: 72px; flex-shrink: 0; }
  .divider { height: 1px; background: var(--color-border-default); }
</style>
</head>
<body>
  <div class="row">
    <div class="key">Label</div>
    <div style="font-family:var(--typography-label-font-family);font-weight:var(--typography-label-font-weight);font-size:var(--typography-label-font-size);line-height:var(--typography-label-line-height);letter-spacing:var(--typography-label-letter-spacing);text-transform:uppercase;color:var(--color-text-primary)">Event Status</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="key">Caption</div>
    <div style="font-family:var(--typography-caption-font-family);font-weight:var(--typography-caption-font-weight);font-size:var(--typography-caption-font-size);line-height:var(--typography-caption-line-height);color:var(--color-text-secondary)">Last updated 2 hours ago · 1,248 attendees registered</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="key">Tagline</div>
    <div style="font-family:var(--typography-tagline-font-family);font-weight:var(--typography-tagline-font-weight);font-size:var(--typography-tagline-font-size);line-height:var(--typography-tagline-line-height);letter-spacing:var(--typography-tagline-letter-spacing);text-transform:uppercase;color:var(--color-brand-secondary)">Innovate · Connect · Digitize</div>
  </div>
</body>
</html>
