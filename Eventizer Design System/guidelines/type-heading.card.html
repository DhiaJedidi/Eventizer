<!-- @dsCard group="Type" viewport="700x180" name="Heading Type" subtitle="H4–H5 — Montserrat Bold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg-surface); padding: 20px 24px; font-family: var(--primitive-font-family-heading); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font-family: var(--primitive-font-family-body); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-disabled); width: 36px; flex-shrink: 0; }
  .divider { height: 1px; background: var(--color-border-default); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">H4</div>
    <div style="font-family:var(--typography-heading-h4-font-family);font-weight:var(--typography-heading-h4-font-weight);font-size:var(--typography-heading-h4-font-size);line-height:var(--typography-heading-h4-line-height);color:var(--color-text-primary)">Upcoming Sessions</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="label">H5</div>
    <div style="font-family:var(--typography-heading-h5-font-family);font-weight:var(--typography-heading-h5-font-weight);font-size:var(--typography-heading-h5-font-size);line-height:var(--typography-heading-h5-line-height);color:var(--color-text-primary)">Attendee Registration</div>
  </div>
</body>
</html>
